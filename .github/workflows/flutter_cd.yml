name: Flutter CD

on:
  push:
    branches: [ main ]   # Only deploy from main branch

jobs:
  build-and-deploy:
    name: Build APK & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Extract version from pubspec.yaml (e.g., 1.0.0)
      - name: Get version from pubspec
        id: pubspec_version
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //;s/+.*//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: |
          flutter build apk --release \
          --build-name=${{ steps.pubspec_version.outputs.VERSION }}.${{ github.run_number }} \
          --build-number=${{ github.run_number }}

      # Save the APK as a downloadable artifact in GitHub
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # Distribute to testers via Firebase App Distribution
      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers                 # Tester group name from Firebase console
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Build v${{ steps.pubspec_version.outputs.VERSION }}.${{ github.run_number }} from commit: ${{ github.sha }}"
